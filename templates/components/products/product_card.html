{% load i18n %}
{% load static %}

<c-vars url="" name="" price_range="" images="" />
<div class="card-hover position-relative bg-secondary rounded-1 p-3 mb-4">
  <button type="button"
          class="btn btn-icon btn-sm btn-light bg-light border-0 rounded-circle position-absolute top-0 end-0 mt-3 me-3 z-5 opacity-0"
          aria-label="{% trans 'Add to favorites' %}">
    <i class="ai-heart fs-xl text-nav"></i>
  </button>
  <div class="swiper swiper-nav-onhover"
       data-swiper-options='{"loop": true, "navigation": {"prevEl": ".btn-prev", "nextEl": ".btn-next"}}'>
    <a href="{{ url }}" class="swiper-wrapper">
      {% for image in images %}
        <div class="swiper-slide p-2 p-xl-4">
          <img src="{{ image.image.url }}"
               class="d-block mx-auto object-fit-contain"
               style="width: auto;
                      height: 250px;
                      max-width:100%"
               alt="{{ image.alt_text }}" />
        </div>
      {% empty %}
        <div class="swiper-slide p-2 p-xl-4">
          <img src="{% static 'images/default-image.png' %}"
               class="d-block mx-auto object-fit-contain"
               style="width: auto;
                      height: 250px;
                      max-width:100%"
               alt="{{ name }}" />
        </div>
      {% endfor %}
    </a>
    <button type="button"
            class="btn btn-prev btn-icon btn-sm btn-light bg-light border-0 rounded-circle start-0"
            aria-label="{% trans 'Previous' %}">
      <i class="ai-chevron-left fs-xl text-nav"></i>
    </button>
    <button type="button"
            class="btn btn-next btn-icon btn-sm btn-light bg-light border-0 rounded-circle end-0"
            aria-label="{% trans 'Next' %}">
      <i class="ai-chevron-right fs-xl text-nav"></i>
    </button>
  </div>
</div>
<div class="d-flex mb-1">
  <h3 class="h6 mb-0">
    <a href="{{ url }}">{{ name }}</a>
  </h3>
</div>
<div class="d-flex align-items-center">
  <span class="me-2">{{ price_range }}</span>
  <div class="nav ms-auto"
       data-bs-toggle="tooltip"
       title="{% trans 'Add to cart' %}">
    <a href="#" class="nav-link fs-lg py-2 px-1">
      <i class="ai-cart"></i>
    </a>
  </div>
</div>
