{% load i18n %}

<div id="toast-container"
     class="toast-container position-fixed top-0 end-0 p-5">
  {% for message in messages %}
    {% with level=message.tags|default:"info" %}
      <div class="toast text-bg-{{ level }} fade"
           role="alert"
           aria-live="assertive"
           aria-atomic="true"
           data-bs-autohide="false"
           data-bs-delay="2000">
        <div class="d-flex align-items-center">
          <div class="toast-body">{{ message }}</div>
          <button type="button"
                  class="btn-close btn-close-white me-3 m-auto"
                  data-bs-dismiss="toast"
                  aria-label="{% trans 'Close' %}"></button>
        </div>
        <div class="toast-timer">
          <div class="timer-bar"></div>
        </div>
      </div>
    {% endwith %}
  {% endfor %}
</div>
